<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
  <!-- Wooden handle (Quill-dark) -->
  <rect x="2" y="2" width="3" height="3" fill="#1a1410"/>
  <!-- Metal collar -->
  <rect x="5" y="2" width="1" height="3" fill="#5a5a64"/>
  <!-- Blade (Chisel slate-blue #7090a8) — wedge polygon -->
  <polygon points="6,2 10,4 11,5 11,6 10,7 6,5" fill="#7090a8"/>
  <!-- Blade tip highlight -->
  <rect x="9" y="5" width="2" height="1" fill="#a8b8c8"/>
  <!-- Wood chip below -->
  <rect x="3" y="9" width="3" height="1" fill="#7a5a44"/>
</svg>
