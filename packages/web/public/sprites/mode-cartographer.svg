<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
  <!-- Scroll body (Cartographer violet #5a4f8a) -->
  <rect x="2" y="3" width="8" height="6" fill="#5a4f8a"/>
  <!-- Scroll roll caps -->
  <rect x="1" y="2" width="10" height="2" fill="#3a3066"/>
  <rect x="1" y="8" width="10" height="2" fill="#3a3066"/>
  <!-- Map ink lines (parchment cream) -->
  <rect x="3" y="5" width="6" height="1" fill="#efe1c0"/>
  <rect x="3" y="7" width="4" height="1" fill="#efe1c0"/>
  <!-- Charcoal mark (dot) -->
  <rect x="8" y="6" width="1" height="1" fill="#1a1410"/>
</svg>
