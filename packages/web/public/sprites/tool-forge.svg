<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
  <!-- Anvil base (dark steel #3a3a40) -->
  <rect x="2" y="8" width="8" height="2" fill="#3a3a40"/>
  <!-- Anvil top -->
  <rect x="1" y="6" width="10" height="2" fill="#3a3a40"/>
  <!-- Hot spark glow (torch ember) -->
  <rect x="5" y="5" width="2" height="1" fill="#e8a541"/>
  <!-- Hammer head (slate gray, tilted via stepped polygon) -->
  <polygon points="3,1 7,1 7,4 3,4" fill="#5a5a64"/>
  <!-- Hammer handle -->
  <rect x="7" y="2" width="3" height="1" fill="#1a1410"/>
</svg>
