<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
  <!-- Shield (Wanderer moss #3d6b3d) -->
  <polygon points="2,2 10,2 10,8 6,11 2,8" fill="#3d6b3d"/>
  <!-- Walking staff (diagonal Quill-dark) -->
  <polygon points="3,3 4,3 8,9 7,9" fill="#1a1410"/>
  <!-- Map roll (parchment) tied to top -->
  <rect x="4" y="3" width="4" height="2" fill="#efe1c0"/>
  <!-- Roll ties -->
  <rect x="4" y="3" width="1" height="2" fill="#7a5a44"/>
  <rect x="7" y="3" width="1" height="2" fill="#7a5a44"/>
</svg>
