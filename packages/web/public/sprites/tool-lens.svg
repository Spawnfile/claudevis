<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
  <!-- Lens frame (cedar gold #c9a96e, octagonal polygon — no circles allowed) -->
  <polygon points="3,1 7,1 9,3 9,7 7,9 3,9 1,7 1,3" fill="#c9a96e"/>
  <!-- Inner glass (parchment) -->
  <polygon points="4,2 6,2 8,4 8,6 6,8 4,8 2,6 2,4" fill="#efe1c0"/>
  <!-- Crosshair lines -->
  <rect x="4" y="4" width="2" height="1" fill="#7a5a44"/>
  <rect x="4" y="6" width="2" height="1" fill="#7a5a44"/>
  <!-- Handle (dark wood) extending bottom-right -->
  <rect x="8" y="8" width="3" height="2" fill="#1a1410"/>
</svg>
