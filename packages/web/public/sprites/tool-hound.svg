<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
  <!-- Body (Hound brown #7a5a44) — stocky polygon -->
  <polygon points="2,6 9,6 9,9 8,10 3,10 2,9" fill="#7a5a44"/>
  <!-- Head (forward-tilted) -->
  <polygon points="9,4 11,5 11,7 9,7" fill="#7a5a44"/>
  <!-- Snout -->
  <rect x="11" y="6" width="1" height="1" fill="#1a1410"/>
  <!-- Ear -->
  <polygon points="9,3 10,4 9,5" fill="#5a3a2e"/>
  <!-- Legs -->
  <rect x="3" y="10" width="1" height="2" fill="#7a5a44"/>
  <rect x="7" y="10" width="1" height="2" fill="#7a5a44"/>
  <!-- Tail tip (straight, alert) -->
  <rect x="1" y="5" width="1" height="2" fill="#7a5a44"/>
</svg>
