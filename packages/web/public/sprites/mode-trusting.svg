<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 12">
  <!-- Open palm body (Trusting olive #7d8c3d) -->
  <rect x="3" y="4" width="6" height="5" fill="#7d8c3d"/>
  <!-- Fingers (4 stubs upward) -->
  <rect x="3" y="2" width="1" height="2" fill="#7d8c3d"/>
  <rect x="5" y="1" width="1" height="3" fill="#7d8c3d"/>
  <rect x="7" y="2" width="1" height="2" fill="#7d8c3d"/>
  <!-- Wax seal (torch) on palm -->
  <rect x="5" y="6" width="2" height="2" fill="#e8a541"/>
  <!-- Wrist -->
  <rect x="4" y="9" width="4" height="2" fill="#5a6a2a"/>
</svg>
