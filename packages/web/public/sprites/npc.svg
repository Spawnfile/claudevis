  <!-- Legs (dark brown, literal landing color) -->
  <rect x="3" y="18" width="3" height="4" fill="#3a2a1f"/>
  <rect x="10" y="18" width="3" height="4" fill="#3a2a1f"/>
  <!-- Head (skin tone, literal landing color) -->
