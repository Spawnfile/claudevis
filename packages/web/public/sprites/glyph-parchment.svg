<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 16">
  <!-- Scroll body (parchment cream) -->
  <rect x="2" y="3" width="8" height="10" fill="#efe1c0"/>
  <!-- Top roll (darker shade) -->
  <rect x="1" y="2" width="10" height="2" fill="#c9b78a"/>
  <!-- Bottom roll -->
  <rect x="1" y="12" width="10" height="2" fill="#c9b78a"/>
  <!-- Ink lines on parchment -->
  <rect x="3" y="6" width="6" height="1" fill="#7a5a44"/>
  <rect x="3" y="8" width="5" height="1" fill="#7a5a44"/>
  <rect x="3" y="10" width="6" height="1" fill="#7a5a44"/>
</svg>
